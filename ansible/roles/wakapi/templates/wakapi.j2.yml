# k8s yaml based on docker config at https://github.com/muety/wakapi#-configuration-options 
    
---   
# for config only. was wakapi-claim0
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wakapi-pvc
spec:
  storageClassName: "{{ kube_storageclass_wakapi }}"
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 16Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wakapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wakapi-web
  template:
    metadata:
      labels:
        app: wakapi-web
    spec:
      # this is needed to resolve bnesql02 from within the container. Note that 'Default' isn't the default, 'ClusterFirst' is
      # because of course it is.
      dnsPolicy: Default
      containers:
        - name: wakapi
          image: ghcr.io/muety/wakapi:latest
          imagePullPolicy: Always
          # needed to resolve bnesql02 from within the container. Note that 'Default' isn't the default, 'ClusterFirst' is
          dnsPolicy: Default
          ports:
            - containerPort: 3000
          env:
            # all of those
            - name: WAKAPI_SUPPORT_CONTACT
              value: "{{wakapi_support_contact}}"
            - name: WAKAPI_MAX_INACTIVE_MONTHS
              value: "-1"
            - name: WAKAPI_PORT
              value: "3000"
            - name: WAKAPI_PUBLIC_URL
              value: "https://{{ wakapi_ingress_host }}"
            - name: WAKAPI_PASSWORD_SALT
              value: "{{wakapi_password_salt}}"
            - name: WAKAPI_INSECURE_COOKIES
              value: "false"
            - name: WAKAPI_EXPOSE_METRICS
              value: "true"
            - name: WAKAPI_DB_HOST
              value: "{{wakapi_db_host}}"
            - name: WAKAPI_DB_PORT
              value: "3306"
            - name: WAKAPI_DB_USER
              value: "{{wakapi_db_username}}"
            - name: WAKAPI_DB_PASSWORD
              value: "{{wakapi_db_password}}"
            - name: WAKAPI_DB_NAME
              value: "{{wakapi_db_schema}}"
            - name: WAKAPI_DB_TYPE
              value: "mysql"
          resources:
            limits:
              # cpu: 250m
              memory: 128Mi
            requests:
              # cpu: 250m
              memory: 128Mi
          volumeMounts:
            - mountPath: /data
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wakapi-pvc        

---
# wakapi docs use a NodePort + ClusterIP service, I'll stick to LoadBalancer
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  selector:
    app: wakapi-web
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: LoadBalancer
---

---    
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata: 
  name: wakapi-tls-secret
data: 
  tls.crt: "{{ wakapi_tls_secret_cert }}"
  tls.key: "{{ wakapi_tls_secret_key }}"

---
# ingress_sample.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wakapi-web-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"  
spec:
  tls:
    - hosts:
        - {{ wakapi_ingress_host }}
      secretName: wakapi-tls-secret    
  rules:
  - host: {{ wakapi_ingress_host }}
    http:
      paths:
      - path: "/"
        pathType: Prefix
        backend:
          service:
            name: "web"
            port:
              number: 8888    

